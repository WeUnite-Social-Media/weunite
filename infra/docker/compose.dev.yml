services:
  db:
    image: postgres:15
    container_name: weunite-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: weunite
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - weunite_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d weunite"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
      target: dev
    container_name: weunite-api
    profiles:
      - api
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ../../apps/api/.env
    environment:
      SERVER_PORT: 8080
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: weunite
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      CORS_ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "8080:8080"
    volumes:
      - ../../apps/api:/workspace
      - weunite_maven_repo:/root/.m2

  web:
    image: node:22-alpine
    container_name: weunite-web
    profiles:
      - web
    working_dir: /workspace
    command: >
      sh -c "corepack enable &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @weunite/web dev --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_URL: http://localhost:8080
      VITE_WS_URL: http://localhost:8080/ws
      VITE_MEDIA_URL: http://localhost:8080
    ports:
      - "5173:5173"
    volumes:
      - ../../:/workspace
      - weunite_node_modules:/workspace/node_modules
      - weunite_web_node_modules:/workspace/apps/web/node_modules
      - weunite_pnpm_store:/root/.local/share/pnpm/store

volumes:
  weunite_postgres_data:
  weunite_maven_repo:
  weunite_node_modules:
  weunite_web_node_modules:
  weunite_pnpm_store:
